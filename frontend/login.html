<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shnoor HRM</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            margin-top: 1rem;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-wrapper">
        <div class="glass-panel login-card">
            <a href="index.html" class="login-logo">
                <i class="fa-solid fa-layer-group" style="color: var(--primary);"></i>
                ShnoorHR
            </a>
            
            <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.875rem;">Sign in to your account to continue</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@shnoor.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
            
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Back to Home</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: pwd })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save info to localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('email', data.email);
                    localStorage.setItem('name', data.name);
                    
                    // Redirect based on role
                    const t = new Date().getTime();
                    if (data.role === 'admin' || data.role === 'super_admin') {
                        window.location.href = `admin/admin.html?v=${t}`;
                    } else if (data.role === 'manager') {
                        window.location.href = `manager/manager.html?v=${t}`;
                    } else if (data.role === 'employee') {
                        window.location.href = `employee/employee.html?v=${t}`;
                    } else if (data.role === 'team_leader') {
                        window.location.href = `team_leader/team_leader.html?v=${t}`;
                    } else {
                        alert('Unknown role: ' + data.role);
                    }
                } else {
                    alert('Login failed: ' + (data.message || 'Invalid credentials'));
                }
            } catch (error) {
                console.error('Error during login:', error);
                alert('Connection error. Is the Django backend running?');
            }
        });
    </script>
</body>
</html>
